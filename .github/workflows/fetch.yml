name: fetch-data
on:
  schedule:
    # GitHub-cron er upresis (ofte 30-150 min forsinket på runde klokkeslett).
    # To forsøk på odde minutter off-peak, begge i god tid før briefen 06:02 UTC.
    - cron: "47 3 * * *"
    - cron: "17 5 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -q procyclingstats cloudscraper pulp requests beautifulsoup4 pyyaml
      - run: python fetch.py
      - name: reoptimalisering
        run: python run_cloud_daily.py || echo '{"errors":["run_cloud_daily feilet - se Actions-loggen"]}' > data/recommendation.json
      - run: |
          git config user.name "data-bot"
          git config user.email "actions@github.com"
          git add -A data/
          git diff --cached --quiet || git commit -m "data $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
