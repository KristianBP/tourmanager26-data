name: fetch-data
on:
  schedule:
    # GitHub-cron kan være 3+ timer forsinket. Tre forsøk spredt over natten
    # slik at minst ett lander før briefen 06:03 UTC selv med store forsinkelser.
    # (Resultater er finale ~19 UTC kvelden før; oraklet publiseres på kvelden.)
    - cron: "47 23 * * *"
    - cron: "17 2 * * *"
    - cron: "51 4 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -q procyclingstats cloudscraper pulp requests beautifulsoup4 pyyaml
      - run: python fetch.py
      - name: reoptimalisering
        run: python run_cloud_daily.py || echo '{"errors":["run_cloud_daily feilet - se Actions-loggen"]}' > data/recommendation.json
      - run: |
          git config user.name "data-bot"
          git config user.email "actions@github.com"
          git add -A data/
          git diff --cached --quiet || git commit -m "data $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
